spring.ai.azure.openai.api-key=${DIAL_API_KEY}
spring.ai.azure.openai.endpoint=https://ai-proxy.lab.epam.com
spring.ai.azure.openai.embedding.options.deployment-name=text-embedding-3-small-1

logging.level.org.springframework.web=TRACE
logging.level.com.azure.ai.openai=DEBUG
logging.level=TRACE
logging.level.org.springframework.web.reactive.function.client=TRACE
logging.level.reactor.netty.http.client=TRACE

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.max-document-batch-size=10000
spring.ai.vectorstore.pgvector.initialize-schema=true

spring.ai.mcp.client.streamable-http.connections.ddg-search.url=http://localhost:8051
spring.ai.mcp.client.streamable-http.connections.ddg-search.endpoint=/mcp/
spring.ai.mcp.client.streamable-http.connections.python.url=http://localhost:8050
spring.ai.mcp.client.streamable-http.connections.python.endpoint=/mcp/
spring.ai.mcp.client.toolcallback.enabled=true
spring.ai.mcp.client.type=sync
spring.ai.mcp.client.transport=streamable-http

spring.ai.mcp.client.stdio.root-change-notification=true

spring.ai.mcp.server.name=general-purpose-agent
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=This is a general purpose agent that can perform a wide range of tasks, including answering questions, providing recommendations, and executing commands. It is designed to be flexible and adaptable, allowing it to handle a variety of use cases and scenarios.
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false

# sse properties
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages
spring.ai.mcp.server.keep-alive-interval=30s
server.port=8081