version: '3.8'
services:

  postgres:
    image: pgvector/pgvector:pg13
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ddg-search:
    image: khshanovskyi/ddg-mcp-server:latest
    ports:
      - "8051:8000"
    environment:
      LOG_LEVEL: "INFO"
      MCP_TRANSPORT: "streamable-http"
    restart: unless-stopped
    mem_limit: 512M
    cpus: 0.5

  python-interpreter:
    image: khshanovskyi/python-code-interpreter-mcp-server:latest
    ports:
      - "8050:8000"
    environment:
      LOG_LEVEL: "INFO"
    restart: unless-stopped
    mem_limit: 2G
    cpus: 2.0

  userservice:
    image: khshanovskyi/mockuserservice:latest
    ports:
      - "8041:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - GENERATE_USERS=true
      - USER_COUNT=1000
    volumes:
      - ./data:/app/data  # Optional: persist database
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



volumes:
  postgres_data:

